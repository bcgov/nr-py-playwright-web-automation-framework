        value: "JAN"
      start_year:
        type: input
        selector: "[id='form:selectFromYear']"
        value: "2017"
      end_month:
        type: dropdown
        selector: "[id='form:selectToMonth'] button"
        value: "MAR"
      end_year:
        type: input
        selector: "[id='form:selectToYear']"
        value: "2026"
      detail_mode:
        type: checkbox
        selector: '[id="form:j_idt83"]'
        value: true
    download_button: 'role=button[name="PDF"]'

