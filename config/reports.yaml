          - "6 - Skeena"
          - "7 - Southern Interior"          
          - "8 - Southern Cariboo"
          - "9 - Fort Nelson - Peace"
      Summary_Report_Type:
        type: checkbox
        selector: '[id="form:reportType"] ul > li:has-text("Regular Chip")'
      zones_dropdown:
        type: checkbox_dropdown
        selector: 'label:has-text("Chip Species") >> .. >> .ui-selectcheckboxmenu-trigger'
        values:
          - "CE - Cedar"
          - "DC - Deciduous sold as Chips"
          - "WW - Whitewood sold as Chips"          
      start_month:
        type: dropdown
        selector: "[id='form:selectFromMonth'] button"
        value: "JAN"
      start_year:
        type: input
        selector: "[id='form:selectFromYear']"
        value: "2017"
      end_month:
        type: dropdown
        selector: "[id='form:selectToMonth'] button"
        value: "MAR"
      end_year:
        type: input
        selector: "[id='form:selectToYear']"
        value: "2026"
      Original Volume:
        type: checkbox
        selector: '[id="form:j_idt128"]'
        value: true
      Converted Volume:
        type: checkbox
        selector: '[id="form:j_idt131"]'
        value: true
      Amount:
        type: checkbox
        selector: '[id="form:j_idt134"]'
        value: true
      AMV:
