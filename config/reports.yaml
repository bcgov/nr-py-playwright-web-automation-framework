  R13 - Ad Hoc:

    # Navigate to report
    menu:
      menu_selector: 'role=link[name="Reports"]'
      expanded_selector: 'li.ui-menuitem-active > ul'
    Report:
      report_selector: 'role=link[name="R13 - Ad Hoc"]'

    inputs:

      Report_Name:
        type: input
        selector: "[id='form:j_idt47']"
        value: "Test Report"
      mills_Number_dropdown:
        type: checkbox_dropdown
        selector: 'label:has-text(" Mill Number(s)") >> .. >> .ui-selectcheckboxmenu-trigger'
        values: []
      mills_Name_dropdown:
        type: checkbox_dropdown
        selector: 'label:has-text(" Mill Names(s)") >> .. >> .ui-selectcheckboxmenu-trigger'
        values: []
      zones_dropdown:
        type: checkbox_dropdown
        selector: 'label:has-text("Zone") >> .. >> .ui-selectcheckboxmenu-trigger'
