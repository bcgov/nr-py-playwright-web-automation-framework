app_url: "https://testapps.nrs.gov.bc.ca/int/isp/"

reports:

  r10_mill_table_audit:

    # Navigate to report
    menu_selector: 'role=link[name="Reports"]'
    report_selector: 'role=link[name="R10 - Mill Table Audit"]'

    inputs:

      mills_dropdown:
        type: checkbox_dropdown
        selector: 'label:has-text("Mill") >> .. >> .ui-selectcheckboxmenu-trigger'
        values: []
      zones_dropdown:
        type: checkbox_dropdown
        selector: 'label:has-text("Zone") >> .. >> .ui-selectcheckboxmenu-trigger'
 #       select_all: true
        values:
          - "9 - Fort Nelson - Peace"
          - "5 - Northern Interior"
          - "6 - Skeena"
          - "8 - Southern Cariboo"
          - "7 - Southern Interior"
      start_month:
        type: dropdown
        selector: "[id='form:selectFromMonth'] button"
        value: "JAN"
      start_year:
        type: input
        selector: "[id='form:selectFromYear']"
        value: "2017"
      end_month:
        type: dropdown
        selector: "[id='form:selectToMonth'] button"
        value: "MAR"
      end_year:
        type: input
        selector: "[id='form:selectToYear']"
        value: "2026"
    download_button: 'role=button[name="PDF"]'



